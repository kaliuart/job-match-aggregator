spring:
  application:
    name: project_getJobs_Spring
  datasource:
    url: jdbc:postgresql://localhost:5433/jobsdb
    username: postgres
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  data:
    redis:
      host: localhost
      port: 6379
    web:
      pageable:
        max-page-size: 100

jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000

gemini:
  api-key: ${GEMINI_API_KEY}

job-filter:
  it-keywords: developer,engineer,programmer,architect,devops,backend,frontend,fullstack,software,java,python,javascript,typescript,kotlin,golang,php,react,angular,spring,django,node,cybersecurity,sysadmin,database,programming,coding